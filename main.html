<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Roll number</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>Rajat</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Kunal</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
